site_name: AWS DevOps Agent Tools
site_url: https://aws-samples.github.io/sample-devops-agent-tools/
site_description: Open-source skills, custom agents, and templates for AWS DevOps Agent — incident response, root cause analysis, and operational troubleshooting.
repo_url: https://github.com/aws-samples/sample-devops-agent-tools
repo_name: aws-samples/sample-devops-agent-tools
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/devops-agent-icon.svg
  favicon: assets/devops-agent-icon.svg
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js
  - javascripts/catalog.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - docs/hooks/skills_catalog.py
  - docs/hooks/agents_catalog.py

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Skills:
      - Catalog:
          - skills/index.md
  - Custom Agents:
      - Catalog:
          - custom-agents/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aws-samples/sample-devops-agent-tools
  generator: false
